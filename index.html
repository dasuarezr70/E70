<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitácora — Plan Ultimate</title>
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#F6F4EF; --surface:#FFFFFF; --ink:#16211D; --muted:#75796F; --line:#E4E0D6;
    --accent:#E8622C; --gym:#2E5EAA; --cardio:#3E7A4C; --field:#C08A1E; --rest:#8A8F87; --tournament:#B23A3A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
  .wrap{max-width:640px;margin:0 auto;padding:18px 16px 60px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .brand{display:flex;flex-direction:column;}
  .brand .kicker{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;}
  .brand h1{font-family:'Space Grotesk',sans-serif;font-size:20px;margin:2px 0 0;font-weight:700;}
  .phase-pill{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--surface);border:1px solid var(--line);padding:6px 10px;border-radius:20px;color:var(--muted);white-space:nowrap;}

  .tabs{display:flex;gap:6px;margin-bottom:14px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:4px;}
  .tab{flex:1;text-align:center;padding:8px 0;border-radius:9px;font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;color:var(--muted);}
  .tab.active{background:var(--ink);color:var(--bg);}

  .daynav{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .navbtn{background:var(--surface);border:1px solid var(--line);border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--ink);flex-shrink:0;transition:transform .1s ease;}
  .navbtn:active{transform:scale(0.92);}
  .datebox{flex:1;text-align:center;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);}
  .datebox b{color:var(--ink);font-size:13px;}
  .todaybtn{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--ink);color:var(--bg);border:none;border-radius:8px;padding:8px 10px;cursor:pointer;flex-shrink:0;}

  .hero{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px;display:flex;align-items:center;gap:18px;margin-bottom:16px;position:relative;overflow:hidden;}
  .hero-bar{position:absolute;left:0;top:0;bottom:0;width:5px;}
  .hero-text{flex:1;min-width:0;}
  .hero-type{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;display:inline-block;padding:3px 8px;border-radius:20px;color:#fff;margin-bottom:8px;}
  .hero-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;line-height:1.3;margin:0 0 4px;}
  .hero-phase{font-size:12px;color:var(--muted);}
  .ring-wrap{position:relative;width:74px;height:74px;flex-shrink:0;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;}

  .weekstrip{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:18px;}
  .daychip{flex-shrink:0;width:46px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:6px 4px;text-align:center;cursor:pointer;}
  .daychip.active{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink) inset;}
  .daychip .dow{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;}
  .daychip .num{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;margin:2px 0 4px;}
  .daychip .dot{width:6px;height:6px;border-radius:50%;margin:0 auto;}
  .daychip .bar{height:3px;border-radius:2px;background:var(--line);margin-top:4px;overflow:hidden;}
  .daychip .bar i{display:block;height:100%;background:var(--accent);}

  .section{margin-bottom:16px;}
  .section-head{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 8px 2px;}
  .exrow{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;}
  .exrow.done{opacity:.55;}
  .chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:1px;background:var(--surface);}
  .chk.on{background:var(--accent);border-color:var(--accent);color:#fff;font-size:13px;}
  .exbody{flex:1;min-width:0;}
  .exhead{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .exname{font-weight:600;font-size:14px;margin-bottom:3px;}
  .exname.done{text-decoration:line-through;}
  .vidbtn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);border:1px solid var(--accent);border-radius:20px;padding:3px 8px;text-decoration:none;white-space:nowrap;flex-shrink:0;}
  .exmeta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:4px;}
  .pill{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg);border:1px solid var(--line);padding:2px 7px;border-radius:6px;color:var(--ink);}
  .pill.load{color:var(--accent);border-color:var(--accent);font-weight:700;}
  .exnotes{font-size:12px;color:var(--muted);line-height:1.4;}
  .weightrow{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;}
  .weightrow label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
  .weightrow input{width:60px;font-family:'JetBrains Mono',monospace;font-size:12px;border:1px solid var(--line);border-radius:6px;padding:4px 6px;background:var(--bg);color:var(--ink);}
  .weightrow input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .lbread{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}

  .note-box{background:var(--surface);border:1px dashed var(--line);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--ink);line-height:1.5;margin-bottom:10px;}
  .note-box b{color:var(--accent);}

  .finalbtn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;cursor:pointer;margin-top:8px;}
  .finalbtn:disabled{background:var(--muted);cursor:default;}
  .finalstatus{text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:8px;}

  .progwrap{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px;}
  .progwrap h3{font-family:'Space Grotesk',sans-serif;font-size:14px;margin:0 0 10px;}
  .progselect{width:100%;font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px;border-radius:8px;border:1px solid var(--line);margin-bottom:10px;background:var(--bg);color:var(--ink);}
  .confignote{font-size:13px;color:var(--muted);line-height:1.6;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;}
  .confignote code{background:var(--bg);padding:1px 5px;border-radius:4px;}

  .timerpill{cursor:pointer;color:var(--ink);border-color:var(--ink);}
  .timerpill:active{transform:scale(0.96);}
  .timer-overlay{
    position:fixed;inset:0;background:rgba(22,33,29,0.75);z-index:999;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .timer-card{
    background:var(--surface);border-radius:20px;padding:28px 24px;max-width:340px;width:100%;
    text-align:center;
  }
  .timer-label{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
  .timer-time{font-family:'Space Grotesk',sans-serif;font-size:56px;font-weight:700;color:var(--ink);margin-bottom:6px;}
  .timer-time.done{color:var(--accent);}
  .timer-sub{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:20px;}
  .timer-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .timer-btn{
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;border:none;border-radius:10px;
    padding:12px 16px;cursor:pointer;
  }
  .timer-btn.primary{background:var(--accent);color:#fff;}
  .timer-btn.secondary{background:var(--bg);color:var(--ink);border:1px solid var(--line);}

  ::-webkit-scrollbar{height:6px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
  @media (max-width:400px){.hero{padding:16px;gap:12px;} .ring-wrap{width:60px;height:60px;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <span class="kicker">Bitácora de entreno</span>
      <h1>Diego · Ultimate</h1>
    </div>
    <div class="phase-pill" id="phasePill">—</div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabPlan">Plan</div>
    <div class="tab" id="tabProg">Progreso</div>
  </div>

  <div id="planView">
    <div class="daynav">
      <div class="navbtn" id="prevBtn">‹</div>
      <div class="datebox" id="dateBox"><b>—</b></div>
      <div class="navbtn" id="nextBtn">›</div>
      <button class="todaybtn" id="todayBtn">HOY</button>
    </div>

    <div class="hero" id="hero">
      <div class="hero-bar" id="heroBar"></div>
      <div class="hero-text">
        <span class="hero-type" id="heroType">—</span>
        <div class="hero-title" id="heroTitle">—</div>
        <div class="hero-phase" id="heroPhase">—</div>
      </div>
      <div class="ring-wrap">
        <svg width="74" height="74" viewBox="0 0 74 74">
          <circle cx="37" cy="37" r="31" fill="none" stroke="var(--line)" stroke-width="7"/>
          <circle id="ringProgress" cx="37" cy="37" r="31" fill="none" stroke="var(--accent)" stroke-width="7" stroke-linecap="round" stroke-dasharray="194.8" stroke-dashoffset="194.8"/>
        </svg>
        <div class="ring-label" id="ringLabel">0/0</div>
      </div>
    </div>

    <div class="weekstrip" id="weekStrip"></div>
    <div id="content"></div>
  </div>

  <div id="progView" style="display:none;">
    <button class="todaybtn" id="refreshProgBtn" style="margin-bottom:12px;">↻ Actualizar</button>
    <div id="progConfigNote"></div>
    <div id="progCharts" style="display:none;">
      <div class="progwrap">
        <h3>Cumplimiento diario (%)</h3>
        <canvas id="chartCumplimiento" height="180"></canvas>
      </div>
      <div class="progwrap">
        <h3>Progresión de carga por ejercicio</h3>
        <select class="progselect" id="exerciseSelect"></select>
        <canvas id="chartCarga" height="180"></canvas>
      </div>
    </div>
  </div>
</div>

<div class="timer-overlay" id="timerOverlay" style="display:none;">
  <div class="timer-card">
    <div class="timer-label" id="timerLabel">Descanso</div>
    <div class="timer-time" id="timerTime">00:00</div>
    <div class="timer-sub" id="timerSub"></div>
    <div class="timer-btns">
      <button class="timer-btn secondary" id="timerPauseBtn">Pausar</button>
      <button class="timer-btn secondary" id="timerAddBtn">+15s</button>
      <button class="timer-btn primary" id="timerCloseBtn">Cerrar</button>
    </div>
  </div>
</div>

const TYPE_COLOR = {gym:'var(--gym)', cardio:'var(--cardio)', field:'var(--field)', rest:'var(--rest)', tournament:'var(--tournament)'};
const TYPE_LABEL = {gym:'Gimnasio', cardio:'Cardio', field:'Campo', rest:'Recuperación', tournament:'Competencia'};
const DOW = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
const KG_TO_LB = 2.20462;

let currentIndex = 0;
const weekProgressCache = {};

function kgToLb(kg){ return Math.round(kg*KG_TO_LB*10)/10; }

function findTodayIndex(){
  const today = new Date();
  const iso = today.toISOString().slice(0,10);
  let idx = DATA.findIndex(d => d.date === iso);
  if(idx === -1){ idx = (iso < DATA[0].date) ? 0 : DATA.length - 1; }
  return idx;
}

function getDayState(dateStr){
  try{ const raw = localStorage.getItem('day:'+dateStr); return raw ? JSON.parse(raw) : {}; }
  catch(e){ return {}; }
}
function setDayState(dateStr, state){
  try{ localStorage.setItem('day:'+dateStr, JSON.stringify(state)); }catch(e){}
}

function checkableIndices(day){ return day.blocks.map((b,i)=>i).filter(i => day.blocks[i].section !== 'Nota'); }

function computeProgress(day, state){
  const idxs = checkableIndices(day);
  const done = idxs.filter(i => state[i] && state[i].done).length;
  return {done, total: idxs.length};
}

function fmtDate(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const dow = DOW[d.getDay()];
  const dd = String(d.getDate()).padStart(2,'0');
  const mon = d.toLocaleDateString('es-CO',{month:'short'}).replace('.','');
  return {dow, dd, mon, full: `${dow} ${dd} ${mon}`};
}

function youtubeSearchUrl(name){
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(name + ' técnica ejercicio');
}

function render(){
  const day = DATA[currentIndex];
  const state = getDayState(day.date);
  const {done, total} = computeProgress(day, state);

  document.getElementById('phasePill').textContent = day.phase;
  const f = fmtDate(day.date);
  document.getElementById('dateBox').innerHTML = `<b>${f.full}</b>`;
  document.getElementById('heroType').textContent = TYPE_LABEL[day.type] || day.type;
  document.getElementById('heroType').style.background = TYPE_COLOR[day.type] || '#999';
  document.getElementById('heroTitle').textContent = day.title;
  document.getElementById('heroPhase').textContent = day.phase;
  document.getElementById('heroBar').style.background = TYPE_COLOR[day.type] || '#999';

  const circumference = 2*Math.PI*31;
  const pct = total>0 ? done/total : 0;
  const ring = document.getElementById('ringProgress');
  ring.setAttribute('stroke-dasharray', circumference.toFixed(1));
  ring.setAttribute('stroke-dashoffset', (circumference*(1-pct)).toFixed(1));
  ring.style.stroke = TYPE_COLOR[day.type] || 'var(--accent)';
  document.getElementById('ringLabel').textContent = total>0 ? `${done}/${total}` : '—';

  document.getElementById('prevBtn').style.visibility = currentIndex===0 ? 'hidden' : 'visible';
  document.getElementById('nextBtn').style.visibility = currentIndex===DATA.length-1 ? 'hidden' : 'visible';

  renderContent(day, state);
  renderWeekStrip(day);
}

function renderContent(day, state){
  const content = document.getElementById('content');
  content.innerHTML = '';

  const grouped = [];
  let lastSection = null;
  day.blocks.forEach((b, i) => {
    if(b.section !== lastSection){ grouped.push({section: b.section, items: []}); lastSection = b.section; }
    grouped[grouped.length-1].items.push({...b, idx: i});
  });

  grouped.forEach(group => {
    if(group.section === 'Nota'){
      group.items.forEach(item => {
        const box = document.createElement('div');
        box.className = 'note-box';
        box.innerHTML = `<b>Nota —</b> ${item.name}`;
        content.appendChild(box);
      });
      return;
    }
    const sec = document.createElement('div');
    sec.className = 'section';
    const head = document.createElement('div');
    head.className = 'section-head';
    head.textContent = group.section;
    sec.appendChild(head);

    group.items.forEach(item => {
      const st = state[item.idx] || {};
      const row = document.createElement('div');
      row.className = 'exrow' + (st.done ? ' done' : '');

      const chk = document.createElement('div');
      chk.className = 'chk' + (st.done ? ' on' : '');
      chk.textContent = st.done ? '✓' : '';
      chk.onclick = () => {
        const ns = state[item.idx] || {};
        ns.done = !ns.done;
        state[item.idx] = ns;
        setDayState(day.date, state);
        render();
      };
      row.appendChild(chk);

      const body = document.createElement('div');
      body.className = 'exbody';

      const head2 = document.createElement('div');
      head2.className = 'exhead';
      const name = document.createElement('div');
      name.className = 'exname' + (st.done ? ' done' : '');
      name.textContent = item.name;
      head2.appendChild(name);
      const vid = document.createElement('a');
      vid.className = 'vidbtn';
      vid.href = youtubeSearchUrl(item.name);
      vid.target = '_blank';
      vid.rel = 'noopener noreferrer';
      vid.textContent = '▶ Ver técnica';
      head2.appendChild(vid);
      body.appendChild(head2);

      const meta = document.createElement('div');
      meta.className = 'exmeta';
      if(item.sr){ const p = document.createElement('span'); p.className='pill'; p.textContent=item.sr; meta.appendChild(p); }
      if(item.load !== undefined){
        const p = document.createElement('span'); p.className='pill load';
        p.textContent = `Sug: ${item.load} kg / ${kgToLb(item.load)} lb (${Math.round(item.pct*100)}%)`;
        meta.appendChild(p);
      }
      if(item.rest){
        const p = document.createElement('span');
        p.className = 'pill timerpill';
        p.textContent = `⏱ Desc ${item.rest}`;
        p.onclick = () => openTimer(parseRestSeconds(item.rest), item.name);
        meta.appendChild(p);
      }
      body.appendChild(meta);

      if(item.notes){ const n=document.createElement('div'); n.className='exnotes'; n.textContent=item.notes; body.appendChild(n); }

      if(item.load !== undefined){
        const wr = document.createElement('div');
        wr.className = 'weightrow';

        const initKg = st.weightKg !== undefined ? st.weightKg : (st.weight || '');
        const initLb = st.weightLb !== undefined ? st.weightLb : (initKg !== '' ? kgToLb(parseFloat(initKg)) : '');

        const lblKg = document.createElement('label'); lblKg.textContent = 'Real kg:';
        const inpKg = document.createElement('input');
        inpKg.type = 'text'; inpKg.inputMode = 'decimal';
        inpKg.placeholder = String(item.load);
        inpKg.value = initKg;

        const lblLb = document.createElement('label'); lblLb.textContent = 'Real lb:';
        const inpLb = document.createElement('input');
        inpLb.type = 'text'; inpLb.inputMode = 'decimal';
        inpLb.placeholder = String(kgToLb(item.load));
        inpLb.value = initLb;

        const saveWeights = (kgVal, lbVal) => {
          const ns = state[item.idx] || {};
          ns.weightKg = kgVal;
          ns.weightLb = lbVal;
          delete ns.weight; // limpiar formato anterior
          state[item.idx] = ns;
          setDayState(day.date, state);
        };

        inpKg.oninput = () => {
          const v = parseFloat(inpKg.value);
          inpLb.value = isNaN(v) ? '' : kgToLb(v);
        };
        inpKg.onchange = () => saveWeights(inpKg.value, inpLb.value);

        inpLb.oninput = () => {
          const v = parseFloat(inpLb.value);
          inpKg.value = isNaN(v) ? '' : Math.round((v/KG_TO_LB)*10)/10;
        };
        inpLb.onchange = () => saveWeights(inpKg.value, inpLb.value);

        wr.appendChild(lblKg); wr.appendChild(inpKg);
        wr.appendChild(lblLb); wr.appendChild(inpLb);
        body.appendChild(wr);
      }

      row.appendChild(body);
      sec.appendChild(row);
    });
    content.appendChild(sec);
  });

  // Botón Finalizar entrenamiento
  const {total: totalCk} = computeProgress(day, state);
  if(totalCk > 0){
    const finalized = state.__finalized;
    const btn = document.createElement('button');
    btn.className = 'finalbtn';
    btn.textContent = finalized ? 'Entrenamiento enviado ✓ (enviar de nuevo)' : 'Finalizar entrenamiento y guardar';
    btn.onclick = () => finalizarEntrenamiento(day, state, btn);
    content.appendChild(btn);
    const status = document.createElement('div');
    status.className = 'finalstatus';
    status.id = 'finalStatus';
    content.appendChild(status);
  }
}

async function finalizarEntrenamiento(day, state, btn){
  const statusEl = document.getElementById('finalStatus');
  if(SHEET_API_URL.indexOf('PON_AQUI') === 0 || SHEET_API_URL.includes('PON_AQUI')){
    statusEl.textContent = 'Falta configurar SHEET_API_URL en el código de la app.';
    return;
  }
  btn.disabled = true;
  statusEl.textContent = 'Enviando a Google Sheets...';
  const idxs = checkableIndices(day);
  const rows = idxs.map(i => {
    const item = day.blocks[i];
    const st = state[i] || {};
    return {
      Fecha: day.date,
      Semana: day.week,
      Fase: day.phase,
      Sesion: day.title,
      Seccion: item.section,
      Ejercicio: item.name,
      SeriesReps: item.sr || '',
      SugeridoKg: item.load !== undefined ? item.load : '',
      SugeridoLb: item.load !== undefined ? kgToLb(item.load) : '',
      RealKg: st.weightKg !== undefined ? st.weightKg : (st.weight || ''),
      RealLb: st.weightLb !== undefined ? st.weightLb : (st.weight ? kgToLb(parseFloat(st.weight)) : ''),
      Completado: st.done ? 'SI' : 'NO'
    };
  });
  try{
    await fetch(SHEET_API_URL, { method: 'POST', body: JSON.stringify({rows}) });
    state.__finalized = true;
    setDayState(day.date, state);
    statusEl.textContent = 'Guardado el ' + new Date().toLocaleString('es-CO');
    btn.disabled = false;
    btn.textContent = 'Entrenamiento enviado ✓ (enviar de nuevo)';
  }catch(err){
    statusEl.textContent = 'Error al enviar. Revisa la URL o tu conexión.';
    btn.disabled = false;
  }
}

function renderWeekStrip(currentDay){
  const strip = document.getElementById('weekStrip');
  strip.innerHTML = '';
  const weekDays = DATA.filter(d => d.week === currentDay.week);
  weekDays.forEach(d => {
    let prog = weekProgressCache[d.date];
    if(!prog){ const st = getDayState(d.date); prog = computeProgress(d, st); weekProgressCache[d.date] = prog; }
    const f = fmtDate(d.date);
    const chip = document.createElement('div');
    chip.className = 'daychip' + (d.date === currentDay.date ? ' active' : '');
    const pct = prog.total>0 ? Math.round(100*prog.done/prog.total) : 0;
    chip.innerHTML = `<div class="dow">${f.dow}</div><div class="num">${f.dd}</div><div class="dot" style="background:${TYPE_COLOR[d.type]||'#999'}"></div><div class="bar"><i style="width:${pct}%"></i></div>`;
    chip.onclick = () => { currentIndex = DATA.findIndex(x => x.date === d.date); render(); };
    strip.appendChild(chip);
  });
}

document.getElementById('prevBtn').onclick = () => { if(currentIndex>0){ currentIndex--; render(); } };
document.getElementById('nextBtn').onclick = () => { if(currentIndex<DATA.length-1){ currentIndex++; render(); } };
document.getElementById('todayBtn').onclick = () => { currentIndex = findTodayIndex(); render(); };

  document.getElementById('tabPlan').classList.add('active');

document.getElementById('refreshProgBtn').onclick = () => loadProgress();

async function loadProgress(){
  const noteEl = document.getElementById('progConfigNote');
  const chartsEl = document.getElementById('progCharts');
  if(SHEET_API_URL.includes('PON_AQUI')){
    noteEl.style.display = 'block';
    chartsEl.style.display = 'none';
    noteEl.innerHTML = `<div class="confignote">Para ver tu progreso aquí, primero configura tu Google Sheet y pega la URL de tu Apps Script en la constante <code>SHEET_API_URL</code> dentro del código de esta app. Revisa las instrucciones que te compartí junto con este archivo.</div>`;
    return;
  }
  noteEl.innerHTML = `<div class="confignote">Cargando datos desde Google Sheets...</div>`;
  chartsEl.style.display = 'none';
  try{
    const res = await fetch(SHEET_API_URL, {method:'GET', cache:'no-store'});
    const rows = await res.json();
    noteEl.innerHTML = '';
    chartsEl.style.display = 'block';
    drawCharts(rows);
  }catch(err){
    noteEl.innerHTML = `<div class="confignote">No se pudo cargar el progreso. Verifica que la URL de Apps Script sea correcta y esté publicada como "Cualquier usuario". (${err})</div>`;
  }
}

let chartCumplimientoInstance = null;
let chartCargaInstance = null;

function drawCharts(rows){
  // Cumplimiento por fecha
  const byDate = {};
  rows.forEach(r => {
    const f = r.Fecha;
    if(!byDate[f]) byDate[f] = {done:0, total:0};
    byDate[f].total++;
    if(String(r.Completado).toUpperCase() === 'SI') byDate[f].done++;
  });
  const dates = Object.keys(byDate).sort();
  const pcts = dates.map(f => Math.round(100*byDate[f].done/byDate[f].total));

  const ctx1 = document.getElementById('chartCumplimiento').getContext('2d');
  if(chartCumplimientoInstance) chartCumplimientoInstance.destroy();
  chartCumplimientoInstance = new Chart(ctx1, {
    type: 'line',
    data: { labels: dates, datasets: [{ label:'% cumplimiento', data: pcts, borderColor:'#E8622C', backgroundColor:'rgba(232,98,44,0.15)', fill:true, tension:0.25 }]},
    options: { responsive:true, scales:{ y:{ min:0, max:100 } }, plugins:{ legend:{ display:false } } }
  });

  // Progresión de carga por ejercicio
  const exerciseNames = [...new Set(rows.filter(r => r.SugeridoKg !== '' && r.SugeridoKg !== undefined).map(r => r.Ejercicio))].sort();
  const sel = document.getElementById('exerciseSelect');
  sel.innerHTML = exerciseNames.map(n => `<option value="${n}">${n}</option>`).join('');
  sel.onchange = () => drawCargaChart(rows, sel.value);
  if(exerciseNames.length) drawCargaChart(rows, exerciseNames[0]);
}

function drawCargaChart(rows, exerciseName){
  const filtered = rows.filter(r => r.Ejercicio === exerciseName).sort((a,b) => a.Fecha.localeCompare(b.Fecha));
  const labels = filtered.map(r => r.Fecha);
  const sugerido = filtered.map(r => parseFloat(r.SugeridoKg) || null);
  const real = filtered.map(r => r.RealKg !== '' ? parseFloat(r.RealKg) : null);

  const ctx = document.getElementById('chartCarga').getContext('2d');
  if(chartCargaInstance) chartCargaInstance.destroy();
  chartCargaInstance = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [
      { label:'Sugerido (kg)', data: sugerido, borderColor:'#8A8F87', borderDash:[4,3], tension:0.2 },
      { label:'Real (kg)', data: real, borderColor:'#2E5EAA', tension:0.2 }
    ]},
    options: { responsive:true, plugins:{ legend:{ display:true, position:'bottom' } } }
  });
}

/* ============ TIMER DE DESCANSO ============ */
let timerInterval = null;
let timerRemaining = 0;
let timerPaused = false;
let audioCtx = null;

function parseRestSeconds(restStr){
  const n = parseFloat(String(restStr).replace(',', '.'));
  if(isNaN(n)) return 60;
  return Math.round(n * 60);
}

function ensureAudioCtx(){
  if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
  return audioCtx;
}

function beep(){
  try{
    const ctx = ensureAudioCtx();
    for(let i=0;i<3;i++){
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = 880;
      o.connect(g); g.connect(ctx.destination);
      const start = ctx.currentTime + i*0.35;
      g.gain.setValueAtTime(0.001, start);
      g.gain.exponentialRampToValueAtTime(0.3, start+0.02);
      g.gain.exponentialRampToValueAtTime(0.001, start+0.28);
      o.start(start); o.stop(start+0.3);
    }
  }catch(e){}
}

function formatTime(sec){
  const m = Math.floor(sec/60);
  const s = sec%60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function updateTimerDisplay(){
  const el = document.getElementById('timerTime');
  el.textContent = formatTime(Math.max(timerRemaining,0));
  el.classList.toggle('done', timerRemaining<=0);
  document.getElementById('timerSub').textContent = timerRemaining>0
    ? (timerPaused ? 'En pausa' : 'Descansando...')
    : '¡Listo! A la siguiente serie.';
}

function openTimer(seconds, label){
  ensureAudioCtx();
  clearInterval(timerInterval);
  timerRemaining = seconds;
  timerPaused = false;
  document.getElementById('timerLabel').textContent = label;
  document.getElementById('timerOverlay').style.display = 'flex';
  document.getElementById('timerPauseBtn').textContent = 'Pausar';
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    if(timerPaused) return;
    timerRemaining--;
    updateTimerDisplay();
    if(timerRemaining <= 0){
      clearInterval(timerInterval);
      beep();
    }
  }, 1000);
}

document.getElementById('timerPauseBtn').onclick = () => {
  timerPaused = !timerPaused;
  document.getElementById('timerPauseBtn').textContent = timerPaused ? 'Reanudar' : 'Pausar';
  updateTimerDisplay();
};
document.getElementById('timerAddBtn').onclick = () => {
  timerRemaining += 15;
  updateTimerDisplay();
};
document.getElementById('timerCloseBtn').onclick = () => {
  clearInterval(timerInterval);
  document.getElementById('timerOverlay').style.display = 'none';
};

currentIndex = findTodayIndex();
render();
</script>
